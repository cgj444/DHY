name: Sync IPTV Playlists

on:
  schedule:
    - cron: '0 */6 * * *'        # 每 6 小时触发（UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.M3U_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download and Update IPTV Playlists
        run: |
          set -e
          echo "🎵 开始下载 IPTV 播放列表..."

          base="https://mgtv.ottiptv.cc"
          files=("huyayqk.m3u" "douyuyqk.m3u" "bililive.m3u")

          # 下载函数（带重试，成功后才覆盖原文件）
          download_with_retry () {
            local url="$1"
            local outfile="$2"
            local tmpfile="${outfile}.tmp"
            local attempt=1
            local max=5

            rm -f "$tmpfile"
            while [ $attempt -le $max ]; do
              echo "➡️  [$attempt/$max] 下载 $outfile ..."
              if wget -q --timeout=15 --connect-timeout=10 "$url" -O "$tmpfile"; then
                if [ -s "$tmpfile" ]; then
                  mv "$tmpfile" "$outfile"
                  echo "✅ $outfile 下载并覆盖完成"
                  return 0
                fi
              fi
              echo "⚠️  $outfile 下载失败，等待 $attempt 秒后重试..."
              sleep $attempt
              attempt=$(( attempt + 1 ))
            done

            echo "❌ $outfile 最终下载失败，保留旧版本"
            rm -f "$tmpfile"
            return 1
          }

          # 下载所有文件
          for f in "${files[@]}"; do
            download_with_retry "${base}/${f}?token=${TOKEN}" "$f" || true
          done

          # 显示下载结果
          echo "📊 文件下载状态："
          for f in "${files[@]}"; do
            if [ -s "$f" ]; then
              echo "✅ $f - $(wc -c < "$f") 字节"
            else
              echo "❌ $f - 文件不存在或为空"
            fi
          done

          # 配置 Git 用户信息
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 检测是否有变更（包括新文件、修改、删除）
          # 先将所有 .m3u 文件加入暂存区（文件不存在时不会报错）
          git add -N *.m3u 2>/dev/null || true
          # 检查暂存区和工作区是否有差异
          if git diff --cached --quiet && git diff --quiet; then
            echo "ℹ️ 没有检测到文件变更，跳过提交"
            exit 0
          fi

          # 将实际变动的文件加入暂存区
          git add *.m3u
          git commit -m "chore: auto-update IPTV playlists - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ 文件已提交"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin ${{ github.ref_name }}
          echo "🚀 更新已推送到仓库"
